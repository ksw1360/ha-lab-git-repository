name: Deploy via SSM (Free Tier)

on:
  push:
    branches: [ "main" ]    
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET: ha-lab-deploy-bucket-${{ secrets.AWS_ACCOUNT_ID }}  # ✅ 수정
  ASG_NAME: ha-lab-asg
  DEPLOY_DIR: /var/www/html
  APP_VERSION: ${{ github.sha }}

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20    
    
    steps:
    # 1. 코드 체크아웃
    - name: Checkout
      uses: actions/checkout@v4
      
    # 2. AWS 자격 증명 설정
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}  # ✅ 수정
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}  # ✅ 수정
        aws-region: ${{ env.AWS_REGION }}  # ✅ 수정
        
    # 3. 배포 버전 정보 index.html 자동 주입
    - name: Inject version info
      run: |
        SHORT_SHA="${{ github.sha }}"
        SHORT_SHA="${SHORT_SHA::7}"
        DEPLOY_TIME="$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
        sed -i "s/배포 버전:[^<]*/배포 버전: ${SHORT_SHA} (${DEPLOY_TIME})/g" index.html || true
        cat index.html
        
    # 4. S3에 배포 파일 업로드
    - name: Upload to S3
      run: |
        zip -r deploy-${{ env.APP_VERSION }}.zip . \
          --exclude "*.git*" ".github/*" "tests/*"
        aws s3 cp deploy-${{ env.APP_VERSION }}.zip \
          s3://${{ env.S3_BUCKET }}/releases/deploy-${{ env.APP_VERSION }}.zip
        aws s3 cp deploy-${{ env.APP_VERSION }}.zip \
          s3://${{ env.S3_BUCKET }}/releases/deploy-latest.zip  # ✅ 수정
          
    # 5. ASG InService 인스턴스 ID 조회
    - name: Get ASG instance IDs
      id: get_instances
      run: |
        INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
          --auto-scaling-group-names "${{ env.ASG_NAME }}" \
          --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
          --output text | tr '\t' ' ')
        echo "instance_ids=${INSTANCE_IDS}" >> $GITHUB_OUTPUT
        
    # 6. SSM Run Command로 각 EC2에 순차 배포 (Rolling)
    - name: Deploy via SSM
      run: |
        for INSTANCE_ID in ${{ steps.get_instances.outputs.instance_ids }}; do
          echo "배포 시작: $INSTANCE_ID"
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "aws s3 cp s3://${{ env.S3_BUCKET }}/releases/deploy-${{ env.APP_VERSION }}.zip /tmp/deploy.zip",
              "unzip -o /tmp/deploy.zip -d ${{ env.DEPLOY_DIR }}",
              "nginx -t && systemctl reload nginx",
              "curl -sf http://localhost/ || exit 1"
            ]' \
            --timeout-seconds 300 \
            --query Command.CommandId --output text)
          
          # 완료 대기 (최대 5분)
          for i in $(seq 1 30); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query CommandStatus --output text 2>/dev/null || echo Pending)
            [ "$STATUS" = "Success" ] && break
            [ "$STATUS" = "Failed" ] && exit 1
          done
          echo "✅ $INSTANCE_ID 배포 완료"
        done
        
    # 7. 배포 완료 알림
    - name: Deployment Success
      run: echo "🎉 모든 인스턴스에 배포 완료!"
